<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripVita March | Wall of Fame</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #EF7F1A;
            --orange-light: #fff3e8;
            --dark: #111111;
            --mid: #666;
            --soft: #f5f4f2;
            --white: #ffffff;
            --gold: #d4960a;
            --gold-bg: #fff8e1;
            --silver: #7e8c99;
            --silver-bg: #f0f2f5;
            --bronze: #a0522d;
            --bronze-bg: #fff0eb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--soft);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px 48px;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
        }

        /* Header */
        .card-header {
            background: var(--dark);
            padding: 28px 32px 24px;
            position: relative;
            overflow: hidden;
        }
        .card-header::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.15;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: -40px; left: 20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.08;
        }
        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--orange);
            margin-bottom: 8px;
        }
        .card-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
        }
        .card-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.45);
            margin-top: 6px;
        }

        .card-body { padding: 28px 32px 32px; }

        /* ── Stats strip ── */
        .stats-strip {
            display: flex;
            gap: 10px;
            margin-bottom: 28px;
        }
        .stat-box {
            flex: 1;
            background: var(--soft);
            border-radius: 14px;
            padding: 14px 10px;
            text-align: center;
        }
        .stat-box .stat-num {
            font-family: 'DM Mono', monospace;
            font-size: 20px;
            font-weight: 600;
            color: var(--orange);
            line-height: 1.1;
        }
        .stat-box .stat-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--mid);
            margin-top: 4px;
            text-transform: uppercase;
        }

        /* ── Section headings ── */
        .section-heading {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #aaa;
            margin-bottom: 12px;
            margin-top: 28px;
        }
        .section-heading:first-of-type { margin-top: 0; }

        /* ── Region scoreboard ── */
        .region-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 8px;
        }
        .region-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--soft);
            border-radius: 14px;
            padding: 12px 16px;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.35s ease both;
        }
        .region-row.top {
            background: var(--orange-light);
            border: 1.5px solid #f5c49a;
        }
        .region-bar-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: rgba(239,127,26,0.07);
            border-radius: 14px;
            transition: width 0.6s ease;
            z-index: 0;
        }
        .region-rank {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--mid);
            width: 20px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .region-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
            flex-grow: 1;
            position: relative;
            z-index: 1;
        }
        .region-row.top .region-name { color: var(--orange); }
        .region-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            position: relative;
            z-index: 1;
        }
        .region-score {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--dark);
        }
        .region-row.top .region-score { color: var(--orange); }
        .region-sub {
            font-size: 11px;
            color: #aaa;
            margin-top: 1px;
        }

        /* ── Individual leaderboard ── */
        .lb-item {
            display: flex;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
            animation: fadeIn 0.3s ease both;
        }
        .lb-item:last-child { border-bottom: none; }

        .rank-badge {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            flex-shrink: 0;
            margin-right: 13px;
        }
        .rank-1 { background: var(--gold-bg);   color: var(--gold);   font-size: 18px; }
        .rank-2 { background: var(--silver-bg); color: var(--silver); font-size: 18px; }
        .rank-3 { background: var(--bronze-bg); color: var(--bronze); font-size: 18px; }
        .rank-n { background: var(--soft);      color: var(--mid); }

        .lb-info { flex-grow: 1; min-width: 0; }
        .lb-name {
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            color: var(--dark);
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-meta {
            font-size: 12px;
            color: var(--mid);
            margin-top: 2px;
        }

        .lb-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
        .score-chip {
            font-family: 'DM Mono', monospace;
            font-weight: 600;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
            background: var(--orange-light);
            color: var(--orange);
        }
        .score-chip.perfect {
            background: var(--gold-bg);
            color: var(--gold);
        }
        .time-label {
            font-family: 'DM Mono', monospace;
            font-size: 11px;
            color: #bbb;
            margin-top: 3px;
        }

        /* States */
        .state-msg {
            text-align: center;
            padding: 36px 0;
            color: var(--mid);
            font-size: 14px;
        }
        .state-msg .emoji { font-size: 34px; margin-bottom: 10px; }

        .spinner {
            width: 34px; height: 34px;
            border: 3px solid #eee;
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 28px auto 10px;
        }

        .btn-back {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: opacity 0.2s;
        }
        .btn-back:hover { opacity: 0.85; }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--orange);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: underline;
        }

        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes fadeIn  {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="brand">TripVita &nbsp;·&nbsp; March 2026</div>
        <h1>Wall of Fame ✨</h1>
        <p>Top 20 champions, ranked by score &amp; speed</p>
    </div>

    <div class="card-body" id="mainBody">
        <!-- Loading state -->
        <div id="loadingState">
            <div class="spinner"></div>
            <p class="state-msg" style="padding:0 0 16px">Loading champions...</p>
        </div>

        <!-- Content (hidden until loaded) -->
        <div id="content" style="display:none">

            <!-- Stats strip -->
            <div class="stats-strip">
                <div class="stat-box">
                    <div class="stat-num" id="statCount">—</div>
                    <div class="stat-label">Entries</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="statTop">—</div>
                    <div class="stat-label">Top Score</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="statLeading">—</div>
                    <div class="stat-label">Leading Region</div>
                </div>
            </div>

            <!-- Region Scoreboard -->
            <div class="section-heading">Region Standings</div>
            <div class="region-grid" id="regionGrid"></div>

            <!-- Individual Leaderboard -->
            <div class="section-heading" style="margin-top:28px">Top 20 Champions</div>
            <div id="leaderboard-list"></div>

        </div>

        <!-- Error state -->
        <div id="errorState" style="display:none">
            <div class="state-msg">
                <div class="emoji">⚠️</div>
                Could not load data.<br>
                <button class="refresh-btn" onclick="loadLeaderboard()">Try again</button>
            </div>
        </div>

        <button class="btn-back" onclick="location.href='quiz.html'">← Back to Quiz</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1krnNrVEuQITS0fMcsGzwcZIt0d1Q2YH57AD1RYoWNuWbdzQ1SMT_X4eU0uroX396/exec';
    const medals = ['🥇', '🥈', '🥉'];
    const REGION_ORDER = ['North', 'South', 'East', 'West', 'OBJ'];

    async function loadLeaderboard() {
        document.getElementById('loadingState').style.display = 'block';
        document.getElementById('content').style.display      = 'none';
        document.getElementById('errorState').style.display   = 'none';

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getLeaderboard`);
            const data = await resp.json();

            document.getElementById('loadingState').style.display = 'none';

            if (!data || data.length === 0) {
                document.getElementById('errorState').innerHTML = `
                    <div class="state-msg">
                        <div class="emoji">🎯</div>
                        No scores yet!<br>
                        <small style="color:#bbb">Be the first to take the quiz.</small>
                    </div>`;
                document.getElementById('errorState').style.display = 'block';
                return;
            }

            document.getElementById('content').style.display = 'block';

            /* ── Stats strip ── */
            document.getElementById('statCount').innerText = data.length;
            document.getElementById('statTop').innerText   = `${data[0].score}/${data[0].total}`;

            /* ── Build region map ── */
            const regionMap = {};
            data.forEach(u => {
                const r = u.region || 'Unknown';
                if (!regionMap[r]) regionMap[r] = { totalScore: 0, count: 0, bestScore: 0, bestSeconds: Infinity };
                regionMap[r].totalScore  += u.score;
                regionMap[r].count       += 1;
                if (u.score > regionMap[r].bestScore ||
                   (u.score === regionMap[r].bestScore && u.seconds < regionMap[r].bestSeconds)) {
                    regionMap[r].bestScore   = u.score;
                    regionMap[r].bestSeconds = u.seconds;
                }
            });

            // Sort regions: highest avg score, then most entries
            const sortedRegions = Object.entries(regionMap).sort((a, b) => {
                const avgA = a[1].totalScore / a[1].count;
                const avgB = b[1].totalScore / b[1].count;
                if (avgB !== avgA) return avgB - avgA;
                return b[1].count - a[1].count;
            });

            const leadingRegion = sortedRegions[0][0];
            document.getElementById('statLeading').innerText = leadingRegion;

            // Max avg for bar width scaling
            const maxAvg = sortedRegions[0][1].totalScore / sortedRegions[0][1].count;

            const regionGrid = document.getElementById('regionGrid');
            regionGrid.innerHTML = '';
            sortedRegions.forEach(([region, stats], i) => {
                const avg      = (stats.totalScore / stats.count).toFixed(1);
                const barPct   = Math.round((parseFloat(avg) / maxAvg) * 100);
                const isTop    = i === 0;
                const rankLabel = i < 3 ? medals[i] : i + 1;

                const row = document.createElement('div');
                row.className = 'region-row' + (isTop ? ' top' : '');
                row.style.animationDelay = `${i * 0.06}s`;
                row.innerHTML = `
                    <div class="region-bar-fill" style="width:${barPct}%"></div>
                    <div class="region-rank">${rankLabel}</div>
                    <div class="region-name">${region}</div>
                    <div class="region-stats">
                        <div class="region-score">${avg} avg</div>
                        <div class="region-sub">${stats.count} participant${stats.count > 1 ? 's' : ''}</div>
                    </div>
                `;
                regionGrid.appendChild(row);
            });

            /* ── Individual leaderboard ── */
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            data.forEach((user, i) => {
                const isPerfect  = user.score === user.total;
                const rankClass  = i < 3 ? `rank-${i + 1}` : 'rank-n';
                const rankLabel  = i < 3 ? medals[i] : i + 1;
                const chipClass  = isPerfect ? 'score-chip perfect' : 'score-chip';

                const item = document.createElement('div');
                item.className = 'lb-item';
                item.style.animationDelay = `${i * 0.04}s`;
                item.innerHTML = `
                    <div class="rank-badge ${rankClass}">${rankLabel}</div>
                    <div class="lb-info">
                        <div class="lb-name">${user.name.toLowerCase()}</div>
                        <div class="lb-meta">${user.region || '—'} &nbsp;·&nbsp; ID: ${user.empId}</div>
                    </div>
                    <div class="lb-right">
                        <span class="${chipClass}">${user.score}/${user.total}${isPerfect ? ' ⭐' : ''}</span>
                        <div class="time-label">⏱ ${user.formattedTime}</div>
                    </div>
                `;
                list.appendChild(item);
            });

        } catch (err) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display   = 'block';
        }
    }

    window.onload = loadLeaderboard;
</script>
</body>
</html>
