<!DOCTYPE html>
<html>
<head>
    <title>TripVita March Quiz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #fdfcfb; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 500px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid #EF7F1A; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn:disabled { background: #ccc; }
        .hidden { display: none; }
        .opt { width: 100%; padding: 15px; margin: 10px 0; background: #f8f8f8; border: 1px solid #eee; text-align: left; border-radius: 10px; cursor: pointer; }
        #timer { text-align: right; font-weight: bold; color: #EF7F1A; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="reg-screen">
        <h2 style="text-align:center">TripVita March</h2>
        <input type="text" id="uName" placeholder="Full Name">
        <input type="text" id="uId" placeholder="Employee ID">
        <input type="email" id="uEmail" placeholder="Email">
        <select id="uReg"><option value="">Select Region</option><option value="North">North</option><option value="South">South</option><option value="West">West</option><option value="OBJ">OBJ</option></select>
        <button class="btn" id="sBtn" onclick="handleStart()">Start Quiz</button>
        <p id="msg" style="text-align:center; font-size:13px; color: #666;"></p>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="timer">Time Spent: 00:00</div>
        <h3 id="qText"></h3>
        <div id="optBox"></div>
    </div>

    <div id="end-screen" class="hidden" style="text-align:center">
        <h2>Complete!</h2>
        <h1 id="fScore" style="color:#EF7F1A; font-size: 50px;"></h1>
        <p id="saveMsg">Saving results...</p>
        <button class="btn" onclick="location.href='leaderboard.html'">View Leaderboard</button>
    </div>
</div>

<script>
    // PASTE YOUR NEW /exec URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLdDKIjgQHN7taaqpYBYOh1XY7iJMeZc-3KnaJAPGQkwdOzemS_wADsViFyKbYqRfx/exec";

    let qs = [], cur = 0, score = 0, sec = 0, timer;

    async function handleStart() {
        const id = document.getElementById('uId').value.trim();
        const name = document.getElementById('uName').value.trim();
        if(!id || !name) return alert("Please enter Name and Employee ID");

        document.getElementById('sBtn').disabled = true;
        document.getElementById('msg').innerText = "Validating Employee ID...";

        try {
            // Check Duplicate
            const cRes = await fetch(`${SCRIPT_URL}?action=checkDuplicate&empId=${encodeURIComponent(id)}`);
            const cData = await cRes.json();

            if (cData.exists) {
                alert("You have already submitted the quiz!");
                document.getElementById('sBtn').disabled = false;
                document.getElementById('msg').innerText = "";
                return;
            }

            // Get Questions
            document.getElementById('msg').innerText = "Loading Questions...";
            const qRes = await fetch(`${SCRIPT_URL}?action=getQuestions`);
            qs = await qRes.json();

            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startTimer();
            renderQ();
        } catch (e) {
            alert("Connection Error. Please check your internet and SCRIPT_URL.");
            document.getElementById('sBtn').disabled = false;
        }
    }

    function renderQ() {
        const q = qs[cur];
        document.getElementById('qText').innerText = (cur+1) + ". " + q.question;
        const box = document.getElementById('optBox');
        box.innerHTML = "";
        q.options.forEach(o => {
            const b = document.createElement('button');
            b.className = "opt"; b.innerText = o;
            b.onclick = () => {
                if(o === q.answer) score++;
                alert((o === q.answer ? "✅ Correct!" : "❌ Wrong! Correct: " + q.answer) + "\n\n" + q.explanation);
                cur++;
                if(cur < qs.length) renderQ(); else finish();
            };
            box.appendChild(b);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            sec++;
            let m = Math.floor(sec/60).toString().padStart(2,'0');
            let s = (sec%60).toString().padStart(2,'0');
            document.getElementById('timer').innerText = `Time Spent: ${m}:${s}`;
        }, 1000);
    }

    async function finish() {
        clearInterval(timer);
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.remove('hidden');
        document.getElementById('fScore').innerText = `${score} / ${qs.length}`;

        const payload = {
            name: document.getElementById('uName').value,
            empId: document.getElementById('uId').value,
            email: document.getElementById('uEmail').value,
            region: document.getElementById('uReg').value,
            score: score,
            totalQuestions: qs.length,
            timeTakenSeconds: sec,
            timeFormatted: document.getElementById('timer').innerText.replace("Time Spent: ","")
        };

        await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        document.getElementById('saveMsg').innerText = "Results saved successfully!";
    }
</script>
</body>
</html>
