<!DOCTYPE html>
<html>
<head>
    <title>TripVita March</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; text-align: center; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: #EF7F1A; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .hidden { display: none; }
        .option { display: block; width: 100%; padding: 10px; margin: 5px 0; background: #eee; border: none; text-align: left; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="card" id="reg-box">
    <h2>TripVita March Quiz</h2>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="eid" placeholder="Employee ID">
    <input type="text" id="email" placeholder="Email">
    <select id="reg">
        <option value="">Select Region</option>
        <option value="North">North</option><option value="South">South</option><option value="West">West</option><option value="OBJ">OBJ</option>
    </select>
    <button class="btn" id="startBtn" onclick="initiateQuiz()">START QUIZ</button>
    <p id="status"></p>
</div>

<div class="card hidden" id="quiz-box">
    <div id="timer" style="font-weight:bold; color:red; margin-bottom:10px;">06:00</div>
    <h3 id="q-text"></h3>
    <div id="options"></div>
</div>

<div class="card hidden" id="result-box">
    <h2>Finished!</h2>
    <h1 id="score-display"></h1>
    <button class="btn" onclick="location.reload()">Take Again</button>
</div>

<script>
    const SCRIPT_URL = "PASTE_YOUR_NEW_EXEC_URL_HERE"; 
    
    let questions = [];
    let current = 0;
    let score = 0;
    let seconds = 0;

    function initiateQuiz() {
        const eid = document.getElementById('eid').value;
        const name = document.getElementById('name').value;
        if(!eid || !name) return alert("Fill Name and ID");

        document.getElementById('startBtn').disabled = true;
        document.getElementById('status').innerText = "Checking ID...";

        // Step 1: Check Duplicate
        fetch(`${SCRIPT_URL}?action=checkDuplicate&empId=${eid}`)
            .then(res => res.json())
            .then(data => {
                if(data.exists) {
                    alert("This ID has already submitted!");
                    document.getElementById('startBtn').disabled = false;
                } else {
                    loadQuestions();
                }
            })
            .catch(err => {
                alert("Connection Error: " + err);
                document.getElementById('startBtn').disabled = false;
            });
    }

    function loadQuestions() {
        document.getElementById('status').innerText = "Loading Questions...";
        fetch(`${SCRIPT_URL}?action=getQuestions`)
            .then(res => res.json())
            .then(data => {
                questions = data;
                document.getElementById('reg-box').classList.add('hidden');
                document.getElementById('quiz-box').classList.remove('hidden');
                showQ();
                startTimer();
            });
    }

    function showQ() {
        const q = questions[current];
        document.getElementById('q-text').innerText = (current + 1) + ". " + q.question;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        q.options.forEach(opt => {
            const b = document.createElement('button');
            b.className = "option";
            b.innerText = opt;
            b.onclick = () => checkAns(opt, q.answer, q.explanation);
            optDiv.appendChild(b);
        });
    }

    function checkAns(selected, correct, exp) {
        if(selected === correct) score++;
        alert((selected === correct ? "Correct!" : "Wrong! Correct was: " + correct) + "\n\n" + exp);
        current++;
        if(current < questions.length) showQ(); else end();
    }

    function startTimer() {
        setInterval(() => { seconds++; }, 1000);
    }

    function end() {
        document.getElementById('quiz-box').classList.add('hidden');
        document.getElementById('result-box').classList.remove('hidden');
        document.getElementById('score-display').innerText = score + " / " + questions.length;
        
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                name: document.getElementById('name').value,
                empId: document.getElementById('eid').value,
                email: document.getElementById('email').value,
                region: document.getElementById('reg').value,
                score: score,
                totalQuestions: questions.length,
                timeTakenSeconds: seconds,
                timeFormatted: Math.floor(seconds/60) + ":" + (seconds%60)
            })
        });
    }
</script>

</body>
</html>
