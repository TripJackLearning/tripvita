<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripVita March Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #EF7F1A;
            --orange-light: #fff3e8;
            --dark: #111111;
            --mid: #555;
            --soft: #f5f4f2;
            --white: #ffffff;
            --radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--soft);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
        }

        .card-header {
            background: var(--dark);
            padding: 28px 32px 24px;
            position: relative;
            overflow: hidden;
        }
        .card-header::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.15;
        }
        .card-header::after {
            content: '';
            position: absolute;
            bottom: -40px; left: 20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.08;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--orange);
            margin-bottom: 8px;
        }
        .card-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
        }
        .card-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .card-body { padding: 32px; }

        /* Registration */
        .field { margin-bottom: 16px; }
        .field label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--mid);
            margin-bottom: 6px;
        }
        .field input, .field select {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e8e8e8;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--dark);
            background: var(--white);
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }
        .field input:focus, .field select:focus { border-color: var(--orange); }
        .field input::placeholder { color: #bbb; }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--orange);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-primary:hover { opacity: 0.92; }
        .btn-primary:active { transform: scale(0.99); }
        .btn-primary:disabled { background: #ddd; color: #aaa; cursor: not-allowed; }

        #msg {
            text-align: center;
            font-size: 13px;
            color: var(--mid);
            margin-top: 12px;
            min-height: 18px;
        }

        /* Quiz Screen */
        .progress-bar-wrap {
            background: #f0f0f0;
            border-radius: 99px;
            height: 6px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background: var(--orange);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        /* Big countdown timer */
        .timer-wrap {
            background: var(--soft);
            border-radius: 20px;
            padding: 16px 0 12px;
            text-align: center;
            margin-bottom: 22px;
            border: 2px solid transparent;
            transition: border-color 0.3s, background 0.3s;
        }
        .timer-wrap.warning {
            background: #fff5f5;
            border-color: #fca5a5;
        }
        #timer {
            font-family: 'DM Mono', monospace;
            font-size: 58px;
            font-weight: 600;
            color: var(--dark);
            letter-spacing: 2px;
            line-height: 1;
            transition: color 0.3s;
        }
        .timer-wrap.warning #timer { color: #e53935; }
        .timer-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: #aaa;
            margin-top: 6px;
        }

        .q-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }
        .q-counter {
            font-size: 12px;
            font-weight: 600;
            color: var(--mid);
            letter-spacing: 0.5px;
        }

        #qText {
            font-family: 'Syne', sans-serif;
            font-size: 17px;
            font-weight: 700;
            color: var(--dark);
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .opt {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 10px;
            background: var(--soft);
            border: 1.5px solid transparent;
            text-align: left;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: var(--dark);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .opt:hover { background: var(--orange-light); border-color: var(--orange); }
        .opt:active { transform: scale(0.99); }
        .opt.correct { background: #e8f5e9; border-color: #4CAF50; }
        .opt.wrong   { background: #fdecea; border-color: #e53935; }

        .opt-letter {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.07);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px;
            flex-shrink: 0;
        }

        .feedback-box {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.6;
            display: none;
        }
        .feedback-box.correct { background: #e8f5e9; border-left: 4px solid #4CAF50; }
        .feedback-box.wrong   { background: #fdecea; border-left: 4px solid #e53935; }
        .feedback-box .fb-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
        .feedback-box.correct .fb-title { color: #2e7d32; }
        .feedback-box.wrong .fb-title   { color: #b71c1c; }
        .feedback-box .explanation { color: #444; font-size: 13px; }

        .btn-next {
            width: 100%;
            padding: 15px;
            background: var(--dark);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 14px;
            display: none;
            transition: opacity 0.2s;
        }
        .btn-next:hover { opacity: 0.85; }

        /* End Screen */
        .score-ring {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: var(--orange-light);
            border: 6px solid var(--orange);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto 24px;
        }
        .score-ring .score-num {
            font-family: 'DM Mono', monospace;
            font-size: 40px;
            font-weight: 600;
            color: var(--orange);
            line-height: 1;
        }
        .score-ring .score-denom {
            font-family: 'DM Mono', monospace;
            font-size: 14px;
            color: var(--mid);
            margin-top: 2px;
        }
        .end-title {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--dark);
            text-align: center;
            margin-bottom: 6px;
        }
        .end-sub {
            text-align: center;
            color: var(--mid);
            font-size: 13px;
            margin-bottom: 28px;
        }
        #saveMsg {
            text-align: center;
            font-size: 13px;
            color: var(--mid);
            margin-top: 12px;
        }

        .hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-in { animation: fadeIn 0.3s ease forwards; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.04); }
        }
        .timer-wrap.warning { animation: pulse 1s ease infinite; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="brand">TripVita &nbsp;·&nbsp; Knowledge Check</div>
        <h1>March 2026 Quiz</h1>
        <p>Test your knowledge. Climb the leaderboard.</p>
    </div>

    <!-- Registration -->
    <div class="card-body" id="reg-screen">
        <div class="field">
            <label>Full Name</label>
            <input type="text" id="uName" placeholder="e.g. Riya Sharma">
        </div>
        <div class="field">
            <label>Employee ID</label>
            <input type="text" id="uId" placeholder="e.g. TJ1042">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="uEmail" placeholder="you@tripjack.com">
        </div>
        <div class="field">
            <label>Region</label>
            <select id="uReg">
                <option value="">Select your region</option>
                <option value="North">North</option>
                <option value="South">South</option>
                <option value="East">East</option>
                <option value="West">West</option>
                <option value="OBJ">OBJ</option>
            </select>
        </div>
        <button class="btn-primary" id="sBtn" onclick="handleStart()">Start Quiz →</button>
        <p id="msg"></p>
    </div>

    <!-- Quiz -->
    <div class="card-body hidden" id="quiz-screen">
        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
        </div>

        <div class="timer-wrap" id="timerWrap">
            <div id="timer">06:00</div>
            <div class="timer-label">Time Remaining</div>
        </div>

        <div class="q-meta">
            <span class="q-counter" id="qCounter">Question 1</span>
        </div>

        <div id="qText"></div>
        <div id="optBox"></div>

        <div class="feedback-box" id="feedbackBox">
            <div class="fb-title" id="fbTitle"></div>
            <div class="explanation" id="fbExplain"></div>
        </div>
        <button class="btn-next" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
    </div>

    <!-- End Screen -->
    <div class="card-body hidden" id="end-screen">
        <div class="score-ring">
            <div class="score-num" id="scoreNum">0</div>
            <div class="score-denom" id="scoreDenom">/ 0</div>
        </div>
        <div class="end-title" id="endTitle">Quiz Complete!</div>
        <div class="end-sub" id="endSub">Great effort. Results have been saved.</div>
        <button class="btn-primary" onclick="location.href='leaderboard.html'">View Leaderboard →</button>
        <p id="saveMsg">Saving your results...</p>
    </div>
</div>

<script>
    const SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbx1krnNrVEuQITS0fMcsGzwcZIt0d1Q2YH57AD1RYoWNuWbdzQ1SMT_X4eU0uroX396/exec";
    const TOTAL_SECONDS = 360; // 6:00

    let qs = [], cur = 0, score = 0;
    let secondsLeft   = TOTAL_SECONDS;
    let timerInterval = null;
    let quizFinished  = false;

    async function handleStart() {
        const name   = document.getElementById('uName').value.trim();
        const id     = document.getElementById('uId').value.trim();
        const email  = document.getElementById('uEmail').value.trim();
        const region = document.getElementById('uReg').value;

        if (!name || !id || !email || !region) {
            document.getElementById('msg').innerText = "Please fill in all fields.";
            return;
        }

        const btn = document.getElementById('sBtn');
        btn.disabled = true;
        document.getElementById('msg').innerText = "Validating Employee ID...";

        try {
            const cRes  = await fetch(`${SCRIPT_URL}?action=checkDuplicate&empId=${encodeURIComponent(id)}`);
            const cData = await cRes.json();
            if (cData.exists) {
                alert("You've already submitted this quiz!");
                btn.disabled = false;
                document.getElementById('msg').innerText = "";
                return;
            }

            document.getElementById('msg').innerText = "Loading questions...";
            const qRes = await fetch(`${SCRIPT_URL}?action=getQuestions`);
            qs = await qRes.json();

            document.getElementById('reg-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            startCountdown();
            renderQ();
        } catch (err) {
            document.getElementById('msg').innerText = "Connection error. Please try again.";
            btn.disabled = false;
        }
    }

    function startCountdown() {
        secondsLeft = TOTAL_SECONDS;
        updateTimerDisplay();
        timerInterval = setInterval(() => {
            secondsLeft--;
            updateTimerDisplay();
            if (secondsLeft <= 30) {
                document.getElementById('timerWrap').classList.add('warning');
            }
            if (secondsLeft <= 0) {
                clearInterval(timerInterval);
                if (!quizFinished) finish(true);
            }
        }, 1000);
    }

    function updateTimerDisplay() {
        const m = Math.floor(secondsLeft / 60).toString().padStart(2, '0');
        const s = (secondsLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `${m}:${s}`;
    }

    function renderQ() {
        const q       = qs[cur];
        const total   = qs.length;
        const letters = ['A', 'B', 'C', 'D'];

        document.getElementById('progressBar').style.width = `${(cur / total) * 100}%`;
        document.getElementById('qCounter').innerText      = `Question ${cur + 1} of ${total}`;
        document.getElementById('qText').innerText         = q.question;

        const box = document.getElementById('optBox');
        box.innerHTML = "";

        const fb = document.getElementById('feedbackBox');
        fb.style.display = 'none';
        fb.className     = 'feedback-box';

        document.getElementById('nextBtn').style.display = 'none';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
            btn.onclick   = () => selectAnswer(opt, btn);
            box.appendChild(btn);
        });

        document.getElementById('quiz-screen').classList.remove('animate-in');
        void document.getElementById('quiz-screen').offsetWidth;
        document.getElementById('quiz-screen').classList.add('animate-in');
    }

    function selectAnswer(chosen, clickedBtn) {
        const q       = qs[cur];
        const correct = q.answer;
        const allOpts = document.querySelectorAll('.opt');

        allOpts.forEach(b => {
            b.disabled = true;
            b.style.pointerEvents = 'none';
            if (b.innerText.trim().slice(1).trim() === correct) b.classList.add('correct');
        });

        if (chosen === correct) {
            score++;
            clickedBtn.classList.add('correct');
            showFeedback(true, q.explanation);
        } else {
            clickedBtn.classList.add('wrong');
            showFeedback(false, q.explanation, correct);
        }

        document.getElementById('nextBtn').style.display = 'block';
        document.getElementById('nextBtn').innerText = cur + 1 < qs.length ? 'Next Question →' : 'See Results →';
    }

    function showFeedback(isCorrect, explanation, correct) {
        const fb      = document.getElementById('feedbackBox');
        const title   = document.getElementById('fbTitle');
        const explain = document.getElementById('fbExplain');

        fb.className      = 'feedback-box ' + (isCorrect ? 'correct' : 'wrong');
        title.innerText   = isCorrect ? '✅ Correct!' : `❌ Incorrect — Correct answer: ${correct}`;
        explain.innerText = explanation || '';
        fb.style.display  = 'block';
    }

    function nextQuestion() {
        cur++;
        if (cur < qs.length) renderQ();
        else finish(false);
    }

    async function finish(timeUp = false) {
        if (quizFinished) return;
        quizFinished = true;
        clearInterval(timerInterval);

        document.getElementById('quiz-screen').classList.add('hidden');
        const end = document.getElementById('end-screen');
        end.classList.remove('hidden');
        end.classList.add('animate-in');

        const total       = qs.length;
        const timeTaken   = TOTAL_SECONDS - secondsLeft;
        const pct         = Math.round((score / total) * 100);
        const mm          = Math.floor(timeTaken / 60).toString().padStart(2, '0');
        const ss          = (timeTaken % 60).toString().padStart(2, '0');
        const timeFormatted = `${mm}:${ss}`;

        document.getElementById('scoreNum').innerText   = score;
        document.getElementById('scoreDenom').innerText = `/ ${total}`;

        let title = timeUp ? "⏰ Time's Up!" : 'Quiz Complete!';
        let sub   = timeUp ? `You answered ${score} of ${total} before time ran out.` : 'Your results have been saved.';
        if (!timeUp) {
            if (score === total) { title = '🏆 Perfect Score!';   sub = "You nailed every question!"; }
            else if (pct >= 80)  { title = '🎉 Excellent Work!';  sub = `${pct}% — You're among the top scorers!`; }
            else if (pct >= 60)  { title = '👍 Good Job!';         sub = `${pct}% — Keep learning!`; }
            else                  { title = '📚 Keep Practising!'; sub = `${pct}% — Come back stronger next month.`; }
        }

        document.getElementById('endTitle').innerText = title;
        document.getElementById('endSub').innerText   = sub;

        const payload = {
            name:             document.getElementById('uName').value,
            empId:            document.getElementById('uId').value,
            email:            document.getElementById('uEmail').value,
            region:           document.getElementById('uReg').value,
            score,
            totalQuestions:   total,
            timeTakenSeconds: timeTaken,
            timeFormatted
        };

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
            document.getElementById('saveMsg').innerText = "✅ Results saved successfully!";
        } catch {
            document.getElementById('saveMsg').innerText = "⚠️ Could not save results. Please contact admin.";
        }
    }
</script>
</body>
</html>
