const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2xRHKxn1U3YQNOIi8BOwVQNHSisfD-j57rUZvwMmEW0BkNoVgNEswsNqbAj9j0i2q/exec';
let timeLeft = 360; // 3. Countdown: 6 minutes (in seconds)
let totalTimeElapsed = 0;

async function startQuiz() {
    // ... (Your existing validation) ...

    const resp = await fetch(SCRIPT_URL + '?action=getQuestions');
    const data = await resp.json();
    
    if(data.error) return alert(data.error); // Handlers Quiz Closed
    questions = data; 
    
    document.getElementById('registration').classList.add('hidden');
    document.getElementById('quiz-box').classList.remove('hidden');
    
    startTime = Date.now();
    runTimers();
    showQuestion();
}

function runTimers() {
    timerInterval = setInterval(() => {
        timeLeft--;
        totalTimeElapsed++;

        // Update display with Countdown
        let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        let s = (timeLeft % 60).toString().padStart(2, '0');
        document.getElementById('timer').innerText = `Time Left: ${m}:${s}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("Time is up!");
            finishQuiz();
        }
    }, 1000);
}

async function finishQuiz() {
    clearInterval(timerInterval);
    document.getElementById('quiz-box').classList.add('hidden');
    document.getElementById('results').classList.remove('hidden');
    
    // 5. Dynamic score display (e.g., 12/15 or 12/20)
    document.getElementById('final-score').innerText = `${score} / ${questions.length}`;

    const m = Math.floor(totalTimeElapsed / 60).toString().padStart(2, '0');
    const s = (totalTimeElapsed % 60).toString().padStart(2, '0');

    const payload = {
        ...userDetails,
        score: score,
        totalQuestions: questions.length, // Dynamic total
        timeTakenSeconds: totalTimeElapsed,
        timeFormatted: `${m}:${s}`
    };

    const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
    const resultText = await response.text();

    if(resultText === "DUPLICATE") {
        document.getElementById('result-msg').innerHTML = "<span style='color:red'>Error: This Employee ID has already submitted.</span>";
    } else {
        document.getElementById('result-msg').innerText = "Result saved successfully!";
    }
}
