<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripVita March | 15/15 Club</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --orange: #EF7F1A;
            --orange-light: #fff3e8;
            --dark: #111111;
            --mid: #666;
            --soft: #f5f4f2;
            --white: #ffffff;
            --gold: #f5a623;
            --silver: #aab0bb;
            --bronze: #c8856a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--soft);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 24px 16px 40px;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.10);
        }

        .card-header {
            background: var(--dark);
            padding: 28px 32px 24px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: -30px; right: -30px;
            width: 130px; height: 130px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.15;
        }

        .card-header::after {
            content: '';
            position: absolute;
            bottom: -40px; left: 20px;
            width: 80px; height: 80px;
            border-radius: 50%;
            background: var(--orange);
            opacity: 0.08;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--orange);
            margin-bottom: 8px;
        }

        .card-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 26px;
            font-weight: 800;
            color: var(--white);
            line-height: 1.2;
        }

        .card-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .card-body { padding: 28px 32px 32px; }

        /* Stats strip */
        .stats-strip {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }
        .stat-box {
            flex: 1;
            background: var(--soft);
            border-radius: 14px;
            padding: 14px 12px;
            text-align: center;
        }
        .stat-box .stat-num {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--orange);
        }
        .stat-box .stat-label {
            font-size: 11px;
            color: var(--mid);
            margin-top: 2px;
            font-weight: 500;
        }

        /* Leaderboard list */
        #leaderboard-list { margin-bottom: 8px; }

        .lb-item {
            display: flex;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f0f0f0;
            animation: fadeIn 0.3s ease both;
        }

        .lb-item:last-child { border-bottom: none; }

        .rank-badge {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 14px;
            flex-shrink: 0;
            margin-right: 14px;
        }

        .rank-1 { background: #fff7e0; color: var(--gold); }
        .rank-2 { background: #f0f2f5; color: var(--silver); }
        .rank-3 { background: #fff0eb; color: var(--bronze); }
        .rank-n { background: var(--soft); color: var(--mid); font-size: 13px; }

        .lb-info { flex-grow: 1; min-width: 0; }
        .lb-name {
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: var(--dark);
            text-transform: capitalize;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .lb-meta {
            font-size: 12px;
            color: var(--mid);
            margin-top: 2px;
        }

        .lb-right { text-align: right; flex-shrink: 0; margin-left: 12px; }
        .score-chip {
            background: var(--orange-light);
            color: var(--orange);
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 8px;
            display: inline-block;
        }
        .time-label {
            font-size: 11px;
            color: #bbb;
            margin-top: 4px;
        }

        /* Empty / loading states */
        .state-msg {
            text-align: center;
            padding: 40px 0;
            color: var(--mid);
            font-size: 14px;
        }
        .state-msg .emoji { font-size: 36px; margin-bottom: 10px; }

        /* Spinner */
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #eee;
            border-top-color: var(--orange);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 30px auto 12px;
        }

        .btn-back {
            width: 100%;
            padding: 16px;
            background: var(--dark);
            color: var(--white);
            border: none;
            border-radius: 16px;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s;
        }
        .btn-back:hover { opacity: 0.85; }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--orange);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-family: 'Syne', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--mid);
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="brand">TripVita &nbsp;·&nbsp; March 2026</div>
        <h1>The 15/15 Club 🏆</h1>
        <p>Perfect scorers, ranked by fastest time</p>
    </div>

    <div class="card-body">
        <!-- Stats strip -->
        <div class="stats-strip" id="statsStrip" style="display:none">
            <div class="stat-box">
                <div class="stat-num" id="statCount">0</div>
                <div class="stat-label">Perfect Scores</div>
            </div>
            <div class="stat-box">
                <div class="stat-num" id="statFastest">—</div>
                <div class="stat-label">Fastest Time</div>
            </div>
        </div>

        <div class="section-title" id="listTitle" style="display:none">Leaderboard</div>

        <!-- List -->
        <div id="leaderboard-list">
            <div class="spinner"></div>
            <p class="state-msg" style="padding:0 0 20px">Loading champions...</p>
        </div>

        <button class="btn-back" onclick="location.href='quiz.html'">← Back to Quiz</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIYHr_v9R83mLEW8O25qvGM7x2WbnpqMXxyMHoJzsmr9QGArt67v3fBAHNMQomkii9/exec';

    const medals = ['🥇', '🥈', '🥉'];

    async function loadLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '<div class="spinner"></div><p class="state-msg" style="padding:0 0 20px">Loading champions...</p>';

        try {
            const resp = await fetch(`${SCRIPT_URL}?action=getLeaderboard`);
            const data = await resp.json();

            list.innerHTML = '';

            if (!data || data.length === 0) {
                list.innerHTML = `
                    <div class="state-msg">
                        <div class="emoji">🎯</div>
                        No perfect scores yet!<br>
                        <small style="color:#bbb">Be the first to score 15/15.</small>
                    </div>`;
                return;
            }

            // Stats
            document.getElementById('statsStrip').style.display = 'flex';
            document.getElementById('listTitle').style.display = 'block';
            document.getElementById('statCount').innerText = data.length;
            document.getElementById('statFastest').innerText = data[0].formattedTime || '—';

            data.forEach((user, i) => {
                const item = document.createElement('div');
                item.className = 'lb-item';
                item.style.animationDelay = `${i * 0.05}s`;

                const rankClass = i < 3 ? `rank-${i + 1}` : 'rank-n';
                const rankLabel = i < 3 ? medals[i] : i + 1;

                item.innerHTML = `
                    <div class="rank-badge ${rankClass}">${rankLabel}</div>
                    <div class="lb-info">
                        <div class="lb-name">${user.name.toLowerCase()}</div>
                        <div class="lb-meta">ID: ${user.empId}</div>
                    </div>
                    <div class="lb-right">
                        <span class="score-chip">15 / 15</span>
                        <div class="time-label">⏱ ${user.formattedTime}</div>
                    </div>
                `;
                list.appendChild(item);
            });

        } catch (err) {
            list.innerHTML = `
                <div class="state-msg">
                    <div class="emoji">⚠️</div>
                    Could not load data.<br>
                    <button class="refresh-btn" onclick="loadLeaderboard()">Try again</button>
                </div>`;
        }
    }

    window.onload = loadLeaderboard;
</script>
</body>
</html>
