<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripVita March | 15/15 Club</title>
    <style>
        :root { --primary: #EF7F1A; --gold: #D4AF37; --dark: #1A1A1A; --bg: #fdfcfb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; border-radius: 24px; padding: 40px; box-sizing: border-box; border-top: 8px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 5px; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .rank { font-weight: 800; width: 35px; color: var(--gold); }
        .name { font-weight: 700; color: var(--dark); text-transform: capitalize; }
        .emp { font-size: 11px; color: #999; }
        .score-badge { background: #fff0e0; color: var(--primary); padding: 4px 10px; border-radius: 8px; font-weight: 800; font-size: 13px; }
    </style>
</head>
<body>
<div class="container">
    <h2>The 15/15 Club</h2>
    <p style="text-align:center; color:#666; font-size:13px; margin-bottom:30px">March 2026 Perfect Scorers</p>
    <div id="leaderboard-list">
        <p style="text-align:center; color:#999">Loading champions...</p>
    </div>
    <button style="margin-top:30px; width:100%; padding:15px; border-radius:12px; border:none; background:var(--dark); color:white; font-weight:bold; cursor:pointer;" onclick="location.href='quiz.html'">Back to Quiz</button>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz2xRHKxn1U3YQNOIi8BOwVQNHSisfD-j57rUZvwMmEW0BkNoVgNEswsNqbAj9j0i2q/exec';

    async function loadLeaderboard() {
        try {
            const resp = await fetch(SCRIPT_URL + '?action=getLeaderboard');
            const data = await resp.json();
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';

            if (data.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#999">No perfect scores yet!</p>';
                return;
            }

            data.forEach((user, i) => {
                const row = document.createElement('div');
                row.className = 'item';
                let rankIcon = i + 1;
                if(i === 0) rankIcon = '🥇';
                if(i === 1) rankIcon = '🥈';
                if(i === 2) rankIcon = '🥉';

                row.innerHTML = `
                    <div class="rank">${rankIcon}</div>
                    <div style="flex-grow:1; margin-left:10px">
                        <div class="name">${user.name.toLowerCase()}</div>
                        <div class="emp">ID: ${user.empId}</div>
                    </div>
                    <div style="text-align:right">
                        <div class="score-badge">15/15</div>
                        <div style="font-size:11px; color:#aaa; margin-top:4px">⏱ ${user.formattedTime}</div>
                    </div>
                `;
                list.appendChild(row);
            });
        } catch (e) {
            document.getElementById('leaderboard-list').innerHTML = '<p style="color:red; text-align:center">Error loading data.</p>';
        }
    }
    window.onload = loadLeaderboard;
</script>
</body>
</html>
